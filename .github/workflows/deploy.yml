name: Deploying multiple files to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Copy file to EC2
      uses: appleboy/scp-action@master

      with:
        host: ${{ secrets.HOST }}
        username: ubuntu
        key: ${{ secrets.SSH_KEY }}
        source: "index.html,style.css,about.html,contact.html"
        target: "/home/ubuntu/"

    - name: Deploy Website
      uses: appleboy/ssh-action@master

      with:
        host: ${{ secrets.HOST }}
        username: ubuntu
        key: ${{ secrets.SSH_KEY }}
        script: |
          sudo cp -r * /var/www/html/